# Modo controlado: file_integrity en carpeta del lab (sin auditd del host).
# En producción usarías el módulo auditd; aquí priorizamos reproducibilidad en Codespaces.

auditbeat.modules:
  - module: file_integrity
    paths:
      - /watch
    scan_at_start: true
    scan_rate_per_sec: 50 MiB
    max_file_size: 100 MiB
    recursive: true
    exclude_files:
      - '(?i)\.swp$'

processors:
  - add_host_metadata: ~

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]

setup.kibana:
  host: "http://kibana:5601"

setup.dashboards.enabled: false
