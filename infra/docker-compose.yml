# Stack de laboratorio — Elastic Stack Observabilidad Lab First
# Uso: cp .env.example .env && docker compose up -d
# Beats (M02-M03): docker compose --profile beats up -d

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: lab-elasticsearch
    environment:
      - node.name=lab-es01
      - cluster.name=lab-observability
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 40s

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    container_name: lab-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status | grep -q available"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s

  loggen:
    image: alpine:3.20
    container_name: lab-loggen
    profiles: ["beats"]
    # Genera tráfico realista con distribución fija 70% INFO/200, 20% WARN/404, 10% ERROR/500.
    # Usa un contador determinista (no $RANDOM) para garantizar variedad en cualquier shell POSIX.
    command:
      - sh
      - -c
      - |
        mkdir -p /logs
        i=0
        while true; do
          i=$$((i + 1))
          m=$$((i % 10))
          if [ "$$m" -lt 7 ]; then LVL=INFO;  ST=200; EP=/api/health;
          elif [ "$$m" -lt 9 ]; then LVL=WARN;  ST=404; EP=/api/orders;
          else LVL=ERROR; ST=500; EP=/api/checkout; fi
          LAT=$$(( (i * 37) % 450 + 15 ))
          echo "$$(date -Iseconds) $$LVL demo-app request_id=$$i method=GET path=$$EP status=$$ST latency_ms=$$LAT" >> /logs/app.log
          sleep 2
        done
    volumes:
      - ./samples/logs:/logs

  filebeat:
    image: docker.elastic.co/beats/filebeat:${STACK_VERSION}
    container_name: lab-filebeat
    profiles: ["beats"]
    user: root
    depends_on:
      elasticsearch:
        condition: service_healthy
      loggen:
        condition: service_started
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./samples/logs:/var/log/lab:ro
    command: ["filebeat", "-e", "--strict.perms=false"]

  metricbeat:
    image: docker.elastic.co/beats/metricbeat:${STACK_VERSION}
    container_name: lab-metricbeat
    profiles: ["beats"]
    user: root
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./metricbeat/metricbeat.yml:/usr/share/metricbeat/metricbeat.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["metricbeat", "-e", "--strict.perms=false"]

  auditbeat:
    image: docker.elastic.co/beats/auditbeat:${STACK_VERSION}
    container_name: lab-auditbeat
    profiles: ["beats"]
    user: root
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./auditbeat/auditbeat.yml:/usr/share/auditbeat/auditbeat.yml:ro
      - ./samples/audit-watch:/watch:ro
    command: ["auditbeat", "-e", "--strict.perms=false"]

volumes:
  esdata:
