[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name              tail
    Tag               lab.fluent
    Path              /var/log/lab/access-lab.log
    Parser            nginx_access
    Refresh_Interval  5
    Read_from_Head    On

[FILTER]
    Name    modify
    Match   lab.fluent
    Add     log_source fluent-bit-lab
    Add     course.module M11

[OUTPUT]
    Name            es
    Match           lab.fluent
    Host            elasticsearch
    Port            9200
    Logstash_Format Off
    Suppress_Type_Name On
    Index           lab-fluent-bit
    Retry_Limit     3
