input {
  beats {
    port => 5044
  }
}

filter {
  if [log][source] == "demo-app" and [message] =~ /latency_ms=/ {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:log_timestamp} %{LOGLEVEL:[log][level]} %{WORD:service.name} request_id=%{NUMBER:request_id} method=%{WORD:http.request.method} path=%{URIPATH:url.path} status=%{NUMBER:http.response.status_code} latency_ms=%{NUMBER:latency_ms}"
      }
      tag_on_failure => ["_grokparsefailure"]
    }
    mutate {
      convert => { "http.response.status_code" => "integer" }
      convert => { "latency_ms" => "integer" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    data_stream => true
    data_stream_type => "logs"
    data_stream_dataset => "filebeat"
    data_stream_namespace => "default"
  }
}
